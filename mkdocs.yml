# MkDocs 配置文件
# 用于生成 Nano-vLLM 项目文档网站

site_name: Nano-vLLM 文档
site_description: Nano-vLLM 是一个轻量级的 vLLM 实现，从头开始构建，用于离线大语言模型推理
site_author: jg Xu
site_url: https://xjg-0216.github.io/nano-vllm/

# 仓库配置
repo_name: Xjg-0216/nano-vllm
repo_url: https://github.com/Xjg-0216/nano-vllm
edit_uri: blob/main/docs/

# 主题配置
theme:
  name: material
  language: zh
  palette:
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  favicon: ""
  logo: ""

# 导航菜单
nav:
  - 首页: index.md
  - 入门指南:
    - 项目介绍: 01-intro/01-01-project-overview.md
    - 架构概览: 01-intro/01-02-architecture.md
    - 学习路径: 01-intro/01-03-learning-path.md
  - Engine 模块:
    - Sequence: 02-engine/02-01-sequence.md
    - BlockManager: 02-engine/02-02-block-manager.md
    - Scheduler: 02-engine/02-03-scheduler.md
    - ModelRunner: 02-engine/02-04-model-runner.md
  - Model 模块:
    - Qwen3 总览: 03-model/03-01-qwen3-overview.md
    - 嵌入层与输出头: 03-model/03-02-embedding.md
    - Attention 机制: 03-model/03-03-attention.md
    - 并行线性层: 03-model/03-04-linear.md
    - 张量并行基础: 03-model/03-05-tensor-parallel.md
    - RoPE 位置编码: 03-model/03-06-rope.md
    - 采样器: 03-model/03-07-sampler.md
  - vLLM 创新: 04-vllm/04-01-innovations.md
  - 部署: 05-deployment/05-01-deploy.md

# 插件配置
plugins:
  - search
  - mermaid2:
      version: 10.6.1
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

# Markdown 扩展
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: Xjg-0216
      repo: nano-vllm
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# 额外配置
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Xjg-0216/nano-vllm
      name: Xjg-0216 on GitHub
  generator: false

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
